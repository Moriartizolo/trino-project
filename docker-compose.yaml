services:
  postgres:
    image: postgres:15
    container_name: postgres-iceberg
    environment:
      POSTGRES_DB: iceberg_meta
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d iceberg_meta"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 10s
    networks:
      - data-platform

  minio:
    image: minio/minio:latest
    container_name: minio-storage
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 10s
    networks:
      - data-platform

  mc:
    image: minio/mc:latest
    container_name: minio-client
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin password;
      mc mb local/iceberg-bucket || true;
      mc mb local/iceberg-bucket-warehouse || true;
      echo 'Buckets created';
      tail -f /dev/null
      "
    networks:
      - data-platform

  db-migrate:
    image: postgres:15
    container_name: postgres-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./init-scripts:/init-scripts:ro
    entrypoint: >
      /bin/sh -c "
      psql postgresql://admin:password@postgres:5432/iceberg_meta -f /init-scripts/02-fix-iceberg-schema.sql;
      echo 'Database migration completed';
      "
    networks:
      - data-platform

  trino:
    image: trinodb/trino:435
    container_name: trino-coordinator
    ports:
      - "8081:8081"
    volumes:
      - ./trino-catalog:/etc/trino/catalog
      - ./trino-config:/etc/trino
      - trino_data:/var/lib/trino/data
    environment:
      - TRINO_JDBC_DRIVER_URL=https://jdbc.postgresql.org/download/postgresql-42.6.0.jar
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 30s
    networks:
      - data-platform
    user: "root"
    command: >
      /bin/bash -c "
      mkdir -p /var/lib/trino/data &&
      chown -R trino:trino /var/lib/trino/data &&
      exec /usr/lib/trino/bin/launcher run --etc-dir /etc/trino
      "

networks:
  data-platform:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  trino_data: