services:
  postgres:
    image: postgres:15
    container_name: postgres-iceberg
    environment:
      POSTGRES_DB: iceberg_meta
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d iceberg_meta"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 10s
    networks:
      - data-platform

  minio:
    image: minio/minio:latest
    container_name: minio-storage
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 10s
    networks:
      - data-platform

  mc:
    image: minio/mc:latest
    container_name: minio-client
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin password;
      mc ls local/iceberg-bucket >/dev/null 2>&1 || mc mb local/iceberg-bucket;
      mc ls local/iceberg-bucket-warehouse >/dev/null 2>&1 || mc mb local/iceberg-bucket-warehouse;
      echo 'Buckets created';
      tail -f /dev/null
      "
    networks:
      - data-platform

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://admin:password@postgres:5432/iceberg_meta?sslmode=disable
    volumes:
      - ./monitoring/postgres-exporter/postgres_exporter.yml:/etc/postgres_exporter/postgres_exporter.yml:ro
    command:
      - --config.file=/etc/postgres_exporter/postgres_exporter.yml
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data-platform

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - trino
      - postgres-exporter
    networks:
      - data-platform

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - data-platform

  trino:
    image: trinodb/trino:435
    container_name: trino-coordinator
    ports:
      - "8081:8081"
      - "9404:9404"
    volumes:
      - ./trino-catalog:/etc/trino/catalog
      - ./trino-config:/etc/trino
      - trino_data:/var/lib/trino/data
    environment:
      - TRINO_JDBC_DRIVER_URL=https://jdbc.postgresql.org/download/postgresql-42.6.0.jar
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 30s
    networks:
      - data-platform
    user: "root"
    command: >
      /bin/bash -c "
      mkdir -p /var/lib/trino/data &&
      if [ ! -f /var/lib/trino/data/jmx_prometheus_javaagent.jar ]; then
        curl -fsSL -o /var/lib/trino/data/jmx_prometheus_javaagent.jar https://repo1.maven.org/maven2/io/prometheus/jmx/jmx_prometheus_javaagent/0.20.0/jmx_prometheus_javaagent-0.20.0.jar;
      fi &&
      chown -R trino:trino /var/lib/trino/data &&
      exec /usr/lib/trino/bin/launcher run --etc-dir /etc/trino
      "

networks:
  data-platform:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  trino_data:
  prometheus_data:
  grafana_data: